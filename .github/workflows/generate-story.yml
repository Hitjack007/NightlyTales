name: Generate Nightly Story

on:
  schedule:
    # Midnight UTC every night
    - cron: '0 0 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate:
    name: Generate & Commit Story
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so we can push
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        working-directory: scripts
        run: npm install

      - name: Generate story
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: npx ts-node generate-story.ts

      - name: Commit and push story files
        run: |
          git config user.name "Nightly Tales Bot"
          git config user.email "nightly-tales-bot@users.noreply.github.com"
          git add public/stories/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit (story may already exist for today)"
          else
            git commit -m "🌙 Nightly story — $(date -u '+%Y-%m-%d')"
            git push
          fi
